version: "3.9"

services:
  api:
    build: .
    container_name: distributed-storage-api
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./temp:/app/temp
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"

  redis:
    image: redis:7-alpine
    container_name: distributed-storage-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: distributed-storage-postgres
    environment:
      POSTGRES_DB: distributed_storage
      POSTGRES_USER: storage_user
      POSTGRES_PASSWORD: storage_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    container_name: distributed-storage-nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
