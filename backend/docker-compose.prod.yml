version: "3.9"

services:
  api:
    build: .
    container_name: distributed-storage-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./temp:/app/temp
    depends_on:
      - redis
      - postgres
    expose:
      - "8000"

  redis:
    image: redis:7-alpine
    container_name: distributed-storage-redis
    restart: unless-stopped
    expose:
      - "6379"

  postgres:
    image: postgres:16-alpine
    container_name: distributed-storage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: distributed_storage
      POSTGRES_USER: storage_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    container_name: distributed-storage-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.https.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

volumes:
  postgres_data:
